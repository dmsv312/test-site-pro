server {
    listen 80;
    server_name _;
    root /var/www/html/web;
    index index.php;

    client_max_body_size 20m;

    # Не раскрываем версию nginx.
    server_tokens off;

    # Базовые security-заголовки (на всех ответах, включая ошибки).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pretty URL Yii2: несуществующие пути отдаём на фронт-контроллер.
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP → php-fpm в контейнере app.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/web;
        fastcgi_read_timeout 180;
        # Не отдаём наружу версию PHP (X-Powered-By от php-fpm).
        fastcgi_hide_header X-Powered-By;
    }

    # Прячем точечные файлы (кроме ACME).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
