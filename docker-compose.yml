# Full stack in one command: docker compose up --build → http://127.0.0.1:8100
# Config comes from .env (see .env.example). Prod mode by default; exposed publicly
# via a Cloudflare Tunnel (sitepro.dm312sv.online).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sitepro}
      POSTGRES_USER: ${POSTGRES_USER:-sitepro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sitepro}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      YII_ENV: ${YII_ENV:-prod}
      YII_DEBUG: ${YII_DEBUG:-false}
      APP_URL: ${APP_URL:-http://127.0.0.1:8100}
      COOKIE_VALIDATION_KEY: ${COOKIE_VALIDATION_KEY:-}
      # Admin credentials — sourced from .env, never hard-coded in PHP.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Optional; when empty the app derives a per-deployment key (no shared committed secret).
      ADMIN_AUTH_KEY: ${ADMIN_AUTH_KEY:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-sitepro}
      DB_USERNAME: ${DB_USERNAME:-sitepro}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      # Live host code (edits visible without a rebuild).
      - ./backend:/var/www/html
      # Sample input files, read-only, for the `yii import/samples` console command.
      - ./sample-data:/opt/sample-data:ro
      # vendor — from the image (anon volume): works on a fresh clone with no host vendor.
      - /var/www/html/vendor
      # Writable paths — container-managed volumes (reliable permissions, host-independent).
      - runtimedata:/var/www/html/runtime
      - webdata:/var/www/html/web

  web:
    image: nginx:alpine
    depends_on:
      - app
    volumes:
      - webdata:/var/www/html/web:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8100:80"

volumes:
  dbdata:
  webdata:
  runtimedata:
